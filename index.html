<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тест GPT-5 Nano</title>
<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center;padding:20px}
video{width:90%;max-width:400px;border-radius:10px;margin:10px 0}
button{background:#e94560;color:#fff;font-size:20px;padding:15px 40px;border:none;border-radius:12px;margin:10px;cursor:pointer}
button:disabled{background:#555}
#result{background:#1a1a3e;border-radius:10px;padding:15px;margin:15px auto;max-width:500px;text-align:left;white-space:pre-wrap;font-size:14px;min-height:50px}
#info{color:#888;font-size:12px;margin:10px 0}
input{width:80%;max-width:400px;padding:12px;border-radius:10px;border:1px solid #333;background:#1a1a3e;color:#fff;font-size:16px;margin:5px 0}
canvas{display:none}
</style>
</head>
<body>
<h2>🧪 Тест GPT-5 Nano + Картинка</h2>
<input type="password" id="key" placeholder="Polza.ai API ключ">
<br>
<video id="vid" autoplay playsinline muted></video>
<br>
<button onclick="test()">📸 Отправить фото</button>
<div id="info"></div>
<div id="result">Ответ появится тут...</div>
<canvas id="cvs"></canvas>

<script>
var vid=document.getElementById('vid');
var cvs=document.getElementById('cvs');

navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
.then(function(s){vid.srcObject=s;})
.catch(function(){alert('Разреши камеру');});

async function test(){
    var key=document.getElementById('key').value.trim();
    if(!key){alert('Введи ключ!');return;}

    var res=document.getElementById('result');
    var inf=document.getElementById('info');
    res.textContent='⏳ Отправляю...';
    inf.textContent='';

    // снимок
    var vw=vid.videoWidth,vh=vid.videoHeight;
    cvs.width=512;cvs.height=Math.round(vh*(512/vw));
    cvs.getContext('2d').drawImage(vid,0,0,cvs.width,cvs.height);
    var b64=cvs.toDataURL('image/jpeg',0.5).split(',')[1];

    var t0=Date.now();

    try{
        var r=await fetch('https://polza.ai/api/v1/chat/completions',{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
            body:JSON.stringify({
                model:'openai/gpt-5-nano',
                messages:[{
                    role:'user',
                    content:[
                        {type:'text',text:'Что на картинке? Ответь кратко.'},
                        {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b64}}
                    ]
                }],
                max_tokens:200
            })
        });

        var d=await r.json();
        var el=((Date.now()-t0)/1000).toFixed(1);

        console.log('ПОЛНЫЙ ОТВЕТ:',JSON.stringify(d,null,2));

        if(d.error){
            res.textContent='❌ ОШИБКА:\n'+JSON.stringify(d.error,null,2);
        } else if(d.choices && d.choices[0]){
            var txt=d.choices[0].message.content;
            var u=d.usage||{};
            res.textContent='✅ ОТВЕТ:\n\n'+txt;
            inf.textContent='⚡'+el+'s | Токены: '+(u.total_tokens||'?')+
                ' | Стоимость: '+(u.cost_rub||u.cost||'?')+'₽';
        } else {
            res.textContent='❓ Странный ответ:\n'+JSON.stringify(d,null,2);
        }
    }catch(e){
        res.textContent='❌ Fetch ошибка:\n'+e.message;
        console.log('ОШИБКА:',e);
    }
}
</script>
</body>
</html>
