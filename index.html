<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nano fix</title>
<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center;padding:15px}
video{width:80%;max-width:350px;border-radius:10px;margin:10px 0}
button{background:#e94560;color:#fff;font-size:16px;padding:14px 30px;
border:none;border-radius:10px;margin:5px;cursor:pointer;width:90%;max-width:350px}
input{width:80%;padding:12px;border-radius:10px;border:1px solid #333;
background:#1a1a3e;color:#fff;font-size:16px;margin:5px 0}
#r{background:#1a1a3e;border-radius:10px;padding:15px;margin:10px auto;
max-width:500px;text-align:left;white-space:pre-wrap;font-size:13px;min-height:80px}
canvas{display:none}
</style>
</head>
<body>
<h2>🧪 Nano — minimal reasoning</h2>
<input type="password" id="key" placeholder="API ключ">
<video id="v" autoplay playsinline muted></video>
<br>
<button onclick="go()">📸 Отправить фото</button>
<div id="r">Нажми кнопку...</div>
<canvas id="c"></canvas>

<script>
var v=document.getElementById('v'),c=document.getElementById('c');
navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
.then(function(s){v.srcObject=s;});

async function go(){
    var key=document.getElementById('key').value.trim();
    if(!key){alert('Ключ!');return;}
    var r=document.getElementById('r');
    r.textContent='⏳ Отправляю...';

    c.width=256;c.height=192;
    c.getContext('2d').drawImage(v,0,0,256,192);
    var b=c.toDataURL('image/jpeg',0.4).split(',')[1];

    var t0=Date.now();
    try{
        var res=await fetch('https://polza.ai/api/v1/chat/completions',{
            method:'POST',
            headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
            body:JSON.stringify({
                model:'openai/gpt-5-nano',
                messages:[{
                    role:'user',
                    content:[
                        {type:'text',text:'Что на фото? Ответь ОДНИМ предложением. Коротко!'},
                        {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+b,detail:'low'}}
                    ]
                }],
                max_tokens:16000,
                reasoning:{
                    effort:'minimal',
                    exclude:true
                }
            })
        });
        var d=await res.json();
        var el=((Date.now()-t0)/1000).toFixed(1);
        console.log('RAW:',JSON.stringify(d,null,2));

        var answer='(пусто)';
        if(d.error){
            answer='ОШИБКА: '+JSON.stringify(d.error);
        } else if(d.choices&&d.choices[0]&&d.choices[0].message){
            answer=d.choices[0].message.content||'(content пустой)';
        }
        var u=d.usage||{};
        var rd=u.completion_tokens_details||{};
        r.textContent=
            '⚡ '+el+'s\n'+
            '🔢 out:'+(u.completion_tokens||'?')+
            ' reason:'+(rd.reasoning_tokens||'?')+
            ' answer:'+(u.completion_tokens-(rd.reasoning_tokens||0))+'\n'+
            '💰 '+(u.cost_rub||u.cost||'?')+'₽\n'+
            'finish: '+(d.choices&&d.choices[0]?d.choices[0].finish_reason:'?')+'\n'+
            '─────────\n'+answer;
    }catch(e){
        r.textContent='❌ '+e.message;
    }
}
</script>
</body>
</html>
